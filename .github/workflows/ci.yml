name: TaskForge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Test ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Java 21 + Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: taskforge_test
          POSTGRES_USER: taskforge
          POSTGRES_PASSWORD: taskforge
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        run: mvn test -B
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: taskforge_test
          DB_USER: taskforge
          DB_PASSWORD: taskforge
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret

  # ── Frontend: Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Node 20 + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npm run build
        working-directory: frontend

  # ── Deploy (placeholder — fill in your Railway/Render token) ──────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # TODO: Replace with your actual deployment provider step
      # Example for Railway:
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@v1.0.0
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: taskforge-backend

      - name: Deployment placeholder
        run: echo "Deploy step pending — add your Railway/Render/Fly.io credentials"
